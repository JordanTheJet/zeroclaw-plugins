name: Publish plugin registry

# Builds every plugin in this repo's plugins/ directory as a wasm32-wasip2 WIT
# component, publishes the zips as assets on the `plugins` release, and commits a
# refreshed registry.json. Self-contained: no checkout of the main repo.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "wit/**"
      - "tools/build-registry.py"

permissions:
  contents: write

concurrency:
  group: publish-plugin-registry
  cancel-in-progress: false

env:
  RELEASE_TAG: plugins
  # Derived from $GITHUB_REPOSITORY in the packaging step so fork runs publish
  # fork-owned assets, while upstream runs publish canonical upstream assets.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate registry tooling + canonical metadata
        run: |
          python3 -m unittest discover -s tools/tests -p 'test_*.py'
          python3 tools/build-registry.py \
            --source-plugins plugins \
            --check-metadata registry.json

      - name: Install Rust + wasip2 target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-wasip2

      - name: Build + stage each plugin
        run: |
          set -euo pipefail
          mkdir -p staged
          for dir in plugins/*/; do
            [ -f "${dir}manifest.toml" ] || continue
            name=$(basename "$dir")
            if grep -qE '^[[:space:]]*registry[[:space:]]*=[[:space:]]*false' "${dir}manifest.toml"; then
              echo "skip $name (registry = false: host-gated source)"
              continue
            fi
            echo "::group::build $name"
            ( cd "$dir" && cargo build --locked --target wasm32-wasip2 --release )
            wasm=$(grep -E '^wasm_path' "${dir}manifest.toml" | sed -E 's/.*"(.*)".*/\1/')
            built=$(find "${dir}target/wasm32-wasip2/release" -maxdepth 1 -name '*.wasm' | head -1)
            mkdir -p "staged/$name"
            cp "${dir}manifest.toml" "staged/$name/"
            [ -n "$built" ] && cp "$built" "staged/$name/$wasm"
            # include skills/ for skill-capable plugins
            [ -d "${dir}skills" ] && cp -r "${dir}skills" "staged/$name/skills"
            echo "::endgroup::"
          done

      - name: Package + generate registry.json
        run: |
          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          python3 tools/build-registry.py \
            --staged staged \
            --release-base "$release_base" \
            --existing-registry registry.json \
            --out dist
          python3 tools/build-registry.py \
            --source-plugins staged \
            --check-metadata dist/registry.json

      - name: Publish zips to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --title "Plugin artifacts" --notes "Rolling plugin zips for the registry."
          if compgen -G 'dist/*.zip' >/dev/null; then
            # Asset names are immutable `<name>-<version>.zip` identities. No
            # clobber: an unexpected existing asset fails closed.
            gh release upload "$RELEASE_TAG" dist/*.zip
          else
            echo "No new plugin versions to upload."
          fi

      - name: Commit refreshed registry.json
        run: |
          cp dist/registry.json registry.json
          if ! git diff --quiet registry.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: refresh plugin registry index"
            git push
          fi
