name: Publish plugin registry

# Rebuilds every plugin in the main repo's `plugins/` directory, publishes the
# zips as assets on the `plugins` release, and commits a refreshed registry.json.
# Run manually, or on a schedule to pick up newly-merged plugins.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # daily

permissions:
  contents: write

env:
  RELEASE_TAG: plugins
  RELEASE_BASE: https://github.com/zeroclaw-labs/zeroclaw-plugins/releases/download/plugins

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry repo
        uses: actions/checkout@v4

      - name: Checkout main repo (plugin sources)
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          path: zeroclaw

      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Build + stage each plugin
        run: |
          set -euo pipefail
          mkdir -p staged
          for dir in zeroclaw/plugins/*/; do
            [ -f "$dir/manifest.toml" ] || continue
            name=$(basename "$dir")
            echo "::group::build $name"
            ( cd "$dir" && cargo build --target wasm32-unknown-unknown --release )
            wasm=$(grep -E '^wasm_path' "$dir/manifest.toml" | sed -E 's/.*"(.*)".*/\1/')
            built=$(find "$dir/target/wasm32-unknown-unknown/release" -maxdepth 1 -name '*.wasm' | head -1)
            mkdir -p "staged/$name"
            cp "$dir/manifest.toml" "staged/$name/"
            [ -n "$built" ] && cp "$built" "staged/$name/$wasm"
            # include skills/ for skill-capable plugins
            [ -d "$dir/skills" ] && cp -r "$dir/skills" "staged/$name/skills"
            echo "::endgroup::"
          done

      - name: Package + generate registry.json
        run: |
          python3 tools/build-registry.py \
            --staged staged \
            --release-base "$RELEASE_BASE" \
            --out dist

      - name: Publish zips to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --title "Plugin artifacts" --notes "Rolling plugin zips for the registry."
          gh release upload "$RELEASE_TAG" dist/*.zip --clobber

      - name: Commit refreshed registry.json
        run: |
          cp dist/registry.json registry.json
          if ! git diff --quiet registry.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: refresh plugin registry index"
            git push
          fi
