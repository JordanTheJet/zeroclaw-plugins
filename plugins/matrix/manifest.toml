name = "matrix"
version = "0.2.0"
description = "Matrix channel plugin for ZeroClaw: Client-Server sync + text send over wasi:http."
author = "JordanTheJet"
wasm_path = "matrix.wasm"
capabilities = ["channel"]
sender_match = "case_insensitive"
# http_client: Matrix Client-Server API sync, whoami, room alias resolution,
# and text sends. TLS is performed host-side.
# config_read: read [channels.matrix.*] when loaded as a mirror plugin.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `matrix` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "matrix"
