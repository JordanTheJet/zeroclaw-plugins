name = "wecom"
version = "0.1.0"
description = "Send-only WeCom Bot Webhook channel plugin for ZeroClaw over wasi:http."
author = "JordanTheJet"
wasm_path = "wecom.wasm"
capabilities = ["channel"]
sender_match = "exact"
# http_client: post text messages to the configured WeCom Bot Webhook.
# config_read: read [channels.wecom.*] when loaded as a mirror plugin.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `wecom` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "wecom"
