name = "amqp"
version = "0.1.0"
description = "AMQP 0-9-1 channel plugin for ZeroClaw over host-mediated TCP/TLS."
author = "JordanTheJet"
wasm_path = "amqp.wasm"
capabilities = ["channel"]
sender_match = "exact"
# Real implementation, kept source-only until ZeroClaw's socket-client host
# capability reaches upstream master.
registry = false
# socket_client: AMQP handshake, consumption, and publishing over host TCP/TLS.
# config_read: read [channels.amqp.*] when loaded as a mirror plugin.
permissions = ["socket_client", "config_read"]
# provides: mirror the built-in `amqp` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "amqp"
