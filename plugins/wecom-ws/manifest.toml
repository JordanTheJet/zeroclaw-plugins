name = "wecom-ws"
version = "0.1.0"
description = "WeCom AI Bot WebSocket channel plugin for ZeroClaw with host-mediated text callbacks and replies."
author = "JordanTheJet"
wasm_path = "wecom_ws.wasm"
capabilities = ["channel"]
sender_match = "exact"
# Real implementation, kept source-only until ZeroClaw's websocket-client host
# capability reaches upstream master.
registry = false
# websocket_client: subscribe, ping, receive callbacks, and send text frames.
# config_read: read [channels.wecom_ws.*] when loaded as a mirror plugin.
permissions = ["websocket_client", "config_read"]
# provides: mirror the built-in `wecom_ws` channel - read the existing
# channel config as the single source of truth and honor native-wins.
provides = "wecom_ws"
