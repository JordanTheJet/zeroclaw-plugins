name = "mochat"
version = "0.1.0"
description = "Mochat customer-service channel plugin for ZeroClaw: message-receive polling + message-send over wasi:http."
author = "JordanTheJet"
wasm_path = "mochat.wasm"
capabilities = ["channel"]
# http_client: outbound calls to the self-hosted Mochat server (TLS is performed
# host-side).
# config_read: read the api_url + api_token + settings from this channel's config
# section.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `mochat` channel — read [channels.mochat.*]
# and honor native-wins. Inert on hosts without the `provides` feature (they
# load this as a novel channel named `mochat`, configured from
# [[plugins.entries.mochat]]).
provides = "mochat"
