name = "mqtt"
version = "0.1.0"
description = "MQTT 3.1.1 channel plugin for ZeroClaw over host-mediated TCP/TLS."
author = "JordanTheJet"
wasm_path = "mqtt.wasm"
capabilities = ["channel"]
sender_match = "exact"
# Real implementation, kept source-only until ZeroClaw's socket-client host
# capability reaches upstream master.
registry = false
# socket_client: the host owns TCP/TLS while this plugin owns MQTT framing.
# config_read: read [channels.mqtt.*] when loaded as a mirror plugin.
permissions = ["socket_client", "config_read"]
# provides: mirror the built-in `mqtt` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "mqtt"
