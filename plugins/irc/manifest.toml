name = "irc"
version = "0.1.0"
description = "IRC channel plugin for ZeroClaw: TLS, registration, SASL, and text chat."
author = "JordanTheJet"
wasm_path = "irc.wasm"
capabilities = ["channel"]
sender_match = "case-insensitive"
# Real text implementation, kept source-only until ZeroClaw's socket-client
# host capability reaches upstream master.
registry = false
# socket_client: IRC registration and chat over host-mediated TLS.
# config_read: read [channels.irc.*] when loaded as a mirror plugin.
permissions = ["socket_client", "config_read"]
# provides: mirror the built-in `irc` channel — read the existing
# channel config as the single source of truth and honor native-wins.
provides = "irc"
