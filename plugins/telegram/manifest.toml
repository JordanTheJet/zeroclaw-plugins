name = "telegram"
version = "0.2.0"
description = "Telegram channel plugin for ZeroClaw: getUpdates long-poll + sendMessage over wasi:http."
author = "JordanTheJet"
wasm_path = "telegram.wasm"
capabilities = ["channel"]
sender_match = "handle"
# http_client: outbound calls to api.telegram.org (TLS is performed host-side).
# config_read: read the bot token + settings from this channel's config section.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `telegram` channel — read [channels.telegram.*]
# and honor native-wins. Inert on hosts without the `provides` feature (they
# load this as a novel channel named `telegram`, configured from
# [[plugins.entries.telegram]]).
provides = "telegram"
