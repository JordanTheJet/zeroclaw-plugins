name = "gmail_push"
version = "0.1.0"
description = "Gmail Pub/Sub push channel plugin for ZeroClaw: authenticated push ingress + Gmail History/messages fetch + send over wasi:http."
author = "JordanTheJet"
wasm_path = "gmail_push.wasm"
capabilities = ["channel"]
# http_client: Gmail API calls (users.watch, history, messages.get, messages.send;
# TLS is performed host-side).
# config_read: read this channel's settings + secrets (oauth_token, topic,
# webhook_secret) from its config section.
permissions = ["http_client", "config_read"]
# provides: mirror the built-in `gmail_push` channel — read [channels.gmail_push.*]
# and honor native-wins. The plugin serves inbound over the host webhook route
# (/plugin/gmail_push); requires a host with the webhook-ingress capability
# (zeroclaw#8862).
provides = "gmail_push"
